# sp1-zorch — board extensions for the fractalyze-plugins workflow.
#
# sp1-zorch is a lean SP1 prover assembled from zorch's agnostic blocks, so the
# board's primary axis is the prover Block being worked on, derived from the
# issue's `area:*` label; `none` catches infra / cross-cutting work. Two views:
# Block lanes for day-to-day, Milestone rollup for the goal.
#
# Schema lives in fractalyze/claude-plugins (workflow plugin).

board_extensions:
  fields:
    - name: Block
      type: single_select
      options: [SMCS, LogupGKR, Jagged, Basefold, Infra, none]
      derive_from_labels:
        SMCS: area:smcs
        LogupGKR: area:logup-gkr
        Jagged: area:jagged
        Basefold: area:basefold
        Infra: area:infra
        _fallback: none

  views:
    - name: Block kanban
      type: board
      group_by: Block
      column_by: Status

    - name: Milestone rollup
      type: board
      group_by: Milestone
      column_by: Status
